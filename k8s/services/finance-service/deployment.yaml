apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: savvy
  labels:
    app: finance-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      initContainers:
      - name: migrate
        image: ghcr.io/YOUR_ORG/savvy-finance-service:latest
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: DATABASE_URL_FINANCE
      containers:
      - name: finance-service
        image: ghcr.io/YOUR_ORG/savvy-finance-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: DATABASE_URL_FINANCE
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: SECRET_KEY
        - name: REDIS_BASE_URL
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: REDIS_BASE_URL
        - name: REDIS_URL
          value: "$(REDIS_BASE_URL)/1"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 15
