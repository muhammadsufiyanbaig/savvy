apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-service
  namespace: savvy
  labels:
    app: bank-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-service
  template:
    metadata:
      labels:
        app: bank-service
    spec:
      initContainers:
      - name: migrate
        image: ghcr.io/YOUR_ORG/savvy-bank-service:latest
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: DATABASE_URL_BANK
      containers:
      - name: bank-service
        image: ghcr.io/YOUR_ORG/savvy-bank-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: DATABASE_URL_BANK
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: SECRET_KEY
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: AWS_S3_BUCKET
        - name: AWS_REGION
          value: "us-east-1"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 15
