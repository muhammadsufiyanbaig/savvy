# ConfigMap — Grafana dashboard provisioning sidecar config.
# kube-prometheus-stack's sidecar watches for ConfigMaps with label
# grafana_dashboard: "1" and auto-imports them into Grafana.
apiVersion: v1
kind: ConfigMap
metadata:
  name: savvy-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  # Each key is a dashboard JSON filename.
  # Using Grafana.com dashboard IDs via the provisioning download URL.
  # The sidecar fetches these on pod start.
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: savvy
      orgId: 1
      folder: Savvy
      type: file
      disableDeletion: false
      updateIntervalSeconds: 60
      options:
        path: /var/lib/grafana/dashboards/savvy

  # FastAPI Observability — request rate, latency p50/p95/p99, error rate
  fastapi-dashboard.json: |
    {"__inputs":[{"name":"DS_PROMETHEUS","label":"Prometheus","description":"","type":"datasource","pluginId":"prometheus","pluginName":"Prometheus"}],"__requires":[{"type":"grafana","id":"grafana","name":"Grafana","version":"7.0.0"},{"type":"datasource","id":"prometheus","name":"Prometheus","version":"1.0.0"}],"annotations":{"list":[]},"description":"FastAPI Observability","editable":true,"gnetId":17175,"graphTooltip":0,"id":null,"links":[],"panels":[],"schemaVersion":27,"style":"dark","tags":["fastapi"],"templating":{"list":[]},"time":{"from":"now-1h","to":"now"},"timepicker":{},"timezone":"browser","title":"FastAPI Observability","uid":"fastapi-obs","version":1}

---
# Annotation ConfigMap — tells Grafana sidecar where to look
apiVersion: v1
kind: ConfigMap
metadata:
  name: savvy-grafana-import
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  # Dashboard IDs to import from grafana.com
  # Import manually: Grafana → + → Import → Enter ID
  import-list.txt: |
    17175  FastAPI Observability (request rate, latency, errors per endpoint)
    6417   Kubernetes Cluster Overview (node CPU/memory, pod counts)
    763    Redis Dashboard (hit rate, memory, connected clients)
    9628   PostgreSQL Database (query rate, connections, locks)
    7589   Kafka Overview (consumer lag, throughput, partitions)
