# notification-db — staging only. Production: use RDS (set DATABASE_URL_NOTIFICATION in secret).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-db
  namespace: savvy
  labels:
    app: notification-db
spec:
  serviceName: notification-db
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: notification_db
        - name: POSTGRES_USER
          value: savvy
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: savvy-secrets
              key: SECRET_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "savvy", "-d", "notification_db"]
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: savvy
spec:
  selector:
    app: notification-db
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
