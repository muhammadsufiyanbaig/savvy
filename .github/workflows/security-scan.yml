name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday 03:00 UTC — catches new CVEs in unchanged code
    - cron: "0 3 * * 1"

jobs:
  # ── Python dependency audit (pip-audit) ──────────────────────────────────────
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - finance-service
          - bank-service
          - statement-analysis-service
          - ai-recommendation-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit ${{ matrix.service }}
        run: |
          pip-audit \
            --requirement microservices/${{ matrix.service }}/requirements.txt \
            --format json \
            --output pip-audit-${{ matrix.service }}.json || true
          # Exit non-zero only on HIGH/CRITICAL
          pip-audit \
            --requirement microservices/${{ matrix.service }}/requirements.txt \
            --severity HIGH

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-${{ matrix.service }}
          path: pip-audit-${{ matrix.service }}.json

  # ── Python static security analysis (bandit) ─────────────────────────────────
  bandit:
    name: Python Static Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit on all services
        run: |
          bandit \
            -r microservices/api-gateway/app \
                microservices/user-service/app \
                microservices/finance-service/app \
                microservices/bank-service/app \
                microservices/statement-analysis-service/app \
                microservices/ai-recommendation-service/app \
                microservices/notification-service/app \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true
          # Fail CI on HIGH severity findings
          bandit \
            -r microservices/api-gateway/app \
                microservices/user-service/app \
                microservices/finance-service/app \
                microservices/bank-service/app \
                microservices/statement-analysis-service/app \
                microservices/ai-recommendation-service/app \
                microservices/notification-service/app \
            --severity-level high \
            --confidence-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Frontend npm audit ────────────────────────────────────────────────────────
  npm-audit:
    name: Frontend npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Docker image scanning (Trivy) ─────────────────────────────────────────────
  trivy-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [python-audit]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - finance-service
          - bank-service
          - statement-analysis-service
          - ai-recommendation-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.service }}
        working-directory: microservices
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t savvy/${{ matrix.service }}:scan \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: savvy/${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
